# Staging: stage.crmflow24.ru
# Слои защиты от индексации: приложение (robots.ts, X-Robots-Tag) + nginx.
# SSL: certbot --nginx -d stage.crmflow24.ru

# HTTP → HTTPS
server {
    listen 80;
    server_name stage.crmflow24.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name stage.crmflow24.ru;

    # certbot managed:
    # ssl_certificate /etc/letsencrypt/live/stage.crmflow24.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/stage.crmflow24.ru/privkey.pem;

    client_max_body_size 10M;
    proxy_read_timeout 120s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;

    # Дополнительный слой: не полагаться только на nginx
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;

    # Статика uploads (вне release, symlink public/uploads)
    location ^~ /uploads/ {
        alias /var/www/shared/crmflow24/uploads/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
        add_header X-Content-Type-Options "nosniff" always;

        location ~* \.(php|pl|py|jsp|asp|aspx|sh|cgi)$ {
            return 403;
        }
        location ~ /\. {
            deny all;
        }
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
    }
}
